version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    target-branch: staging
    groups:
      astro-ecosystem:
        patterns:
          - astro
          - '@astrojs/*'
          - '@tailwindcss/*'
          - tailwindcss
      preact-ecosystem:
        patterns:
          - preact
          - '@preact/*'
      tooling:
        patterns:
          - '@biomejs/*'
          - typescript
    open-pull-requests-limit: 10
    labels:
      - dependencies
    reviewers:
      - carlosp-11
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    target-branch: staging
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci)'
